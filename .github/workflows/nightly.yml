name: Nightly Build (Development)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: write

jobs:
  build:
    name: Windows Build - Development
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Development branch
        uses: actions/checkout@v4
        with:
          ref: Development
          lfs: false
          fetch-depth: 0

      - name: Capture build metadata
        id: build_meta
        run: |
          BUILD_COMMIT=$(git rev-parse HEAD)
          SHORT_SHA=$(git rev-parse --short "$BUILD_COMMIT")
          BUILD_DATE=$(date -u '+%Y-%m-%d')
          BUILD_VERSION="0.0.${GITHUB_RUN_NUMBER}-nightly+${SHORT_SHA}"
          {
            echo "commit_sha=$BUILD_COMMIT"
            echo "short_sha=$SHORT_SHA"
            echo "build_date=$BUILD_DATE"
            echo "build_version=$BUILD_VERSION"
          } >> $GITHUB_OUTPUT

      - name: Cache Unity Library
        uses: actions/cache@v3
        with:
          path: Library
          key: Library-Dev-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: Library-Dev-

      - name: Install video codec dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libgstreamer1.0-0 libgstreamer-plugins-base1.0-0

      - name: Remove CI-incompatible demo assets
        run: |
          rm -f "Assets/Imported Assets/GogoGaga/OptimizedRopesAndCables/Example/Prefab/Headphone.prefab"
          rm -f "Assets/Imported Assets/GogoGaga/OptimizedRopesAndCables/Example/Prefab/Headphone.prefab.meta"
          rm -f "Assets/Imported Assets/GogoGaga/OptimizedRopesAndCables/Example/Prefab/SimplePole Variant.prefab"
          rm -f "Assets/Imported Assets/GogoGaga/OptimizedRopesAndCables/Example/Prefab/SimplePole Variant.prefab.meta"
          rm -f "Assets/Imported Assets/GogoGaga/OptimizedRopesAndCables/Example/Prefab/Snow_Flake Variant.prefab"
          rm -f "Assets/Imported Assets/GogoGaga/OptimizedRopesAndCables/Example/Prefab/Snow_Flake Variant.prefab.meta"
          rm -f "Assets/Imported Assets/GogoGaga/OptimizedRopesAndCables/Example/Prefab/TelephonePole Variant.prefab"
          rm -f "Assets/Imported Assets/GogoGaga/OptimizedRopesAndCables/Example/Prefab/TelephonePole Variant.prefab.meta"
          rm -f "Assets/Imported Assets/WireBuilder/Prefabs/EndAnchor.prefab"
          rm -f "Assets/Imported Assets/WireBuilder/Prefabs/EndAnchor.prefab.meta"

      - name: Gather today's introduced changes
        id: commits
        run: |
          SINCE=$(date -u '+%Y-%m-%dT00:00:00Z')
          TARGET_COMMIT="${{ steps.build_meta.outputs.commit_sha }}"
          BASE_COMMIT=$(git rev-list -1 --before="$SINCE" "$TARGET_COMMIT")

          if [ -n "$BASE_COMMIT" ]; then
            RANGE="$BASE_COMMIT..$TARGET_COMMIT"
          else
            RANGE="$TARGET_COMMIT"
          fi

          LOG=$(git log "$RANGE" --reverse --no-merges --pretty=format:"- %s (%an)")
          if [ -z "$LOG" ]; then
            LOG=$(git log "$RANGE" --reverse --pretty=format:"- %s (%an)" | grep -vE '^- Merge ' || true)
          fi
          if [ -z "$LOG" ]; then
            LOG="- No new Development changes were introduced today."
          fi

          RAW_LOG=$(git log "$RANGE" --reverse --pretty=format:"- %h %s (%an)")
          if [ -z "$RAW_LOG" ]; then
            RAW_LOG="$LOG"
          fi

          {
            echo "commit_log<<EOF"
            echo "$LOG"
            echo "EOF"
            echo "raw_commit_log<<EOF"
            echo "$RAW_LOG"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Build fallback summary from commit titles
        id: fallback_summary
        run: |
          COMMIT_LOG='${{ steps.commits.outputs.commit_log }}'

          if [ "$COMMIT_LOG" = "- No new Development changes were introduced today." ]; then
            SUMMARY="- No new Development commits were pushed today."
          else
            SUMMARY="$COMMIT_LOG"
          fi

          {
            echo "summary<<EOF"
            echo "$SUMMARY"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Summarize commits with Gemini
        id: summary
        run: |
          COMMIT_LOG='${{ steps.commits.outputs.commit_log }}'
          FALLBACK_SUMMARY='${{ steps.fallback_summary.outputs.summary }}'

          if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then
            {
              echo "summary<<EOF"
              echo "$FALLBACK_SUMMARY"
              echo "EOF"
            } >> $GITHUB_OUTPUT
            exit 0
          fi

          PAYLOAD=$(jq -n \
            --arg log "$COMMIT_LOG" \
            '{
              contents: [{
                parts: [{
                  text: ("You are a changelog writer for a game development project called eXSert. Given the following commit titles that were introduced into the Development branch today, write a short, friendly summary (3-6 bullet points) of what was added, fixed, or changed. Group related changes together. Ignore merge commits, PR bookkeeping, and branch sync messages. Do not repeat commit messages verbatim — paraphrase them clearly. Use plain language a playtester would understand.\n\nCommits:\n" + $log)
                }]
              }]
            }')

          RESPONSE=$(curl -s \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          SUMMARY=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')

          if [ -z "$SUMMARY" ]; then
            API_ERROR=$(echo "$RESPONSE" | jq -r '.error.message // empty')
            if [ -n "$API_ERROR" ]; then
              echo "Gemini summary failed: $API_ERROR"
            else
              echo "Gemini summary failed: empty response"
            fi
            SUMMARY="$FALLBACK_SUMMARY"
          fi

          {
            echo "summary<<EOF"
            echo "$SUMMARY"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Build project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: StandaloneWindows64
          buildName: eXSert
          unityVersion: 6000.2.15f1
          versioning: Custom
          version: ${{ steps.build_meta.outputs.build_version }}
          allowDirtyBuild: true

      - name: Package build
        id: package
        run: |
          BUILD_DATE='${{ steps.build_meta.outputs.build_date }}'
          SHORT_SHA='${{ steps.build_meta.outputs.short_sha }}'
          ZIP_NAME=eXSert-daily-${BUILD_DATE}.zip
          zip -r "$ZIP_NAME" build/StandaloneWindows64/
          echo "build_date=$BUILD_DATE" >> $GITHUB_OUTPUT
          echo "zip_name=$ZIP_NAME" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "tag_name=daily-${BUILD_DATE}-${GITHUB_RUN_NUMBER}-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Create and push daily tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "${{ steps.package.outputs.tag_name }}"
          git push origin "${{ steps.package.outputs.tag_name }}"

      - name: Create DailyBuild release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.package.outputs.tag_name }}
          name: "Daily Build — ${{ steps.package.outputs.build_date }} (#${{ github.run_number }}, ${{ steps.package.outputs.short_sha }})"
          body: |
            ## Daily Build — ${{ steps.package.outputs.build_date }}

            Automated daily build from the **Development** branch.
            Workflow run: #${{ github.run_number }}
            Source commit: `${{ steps.package.outputs.short_sha }}`

            ---

            ## What's new today

            ${{ steps.summary.outputs.summary }}

            ---

            ## Raw commits

            ${{ steps.commits.outputs.raw_commit_log }}
          files: ${{ steps.package.outputs.zip_name }}
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
